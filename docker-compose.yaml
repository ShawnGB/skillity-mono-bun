services:
  db:
    image: postgres:17-alpine
    container_name: skillity_db
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d app_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: skillity_minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: dev_user
      MINIO_ROOT_PASSWORD: dev_pass
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio_init:
    image: minio/mc
    container_name: skillity_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 dev_user dev_pass;
      mc mb --ignore-existing local/skillity;
      mc anonymous set public local/skillity;
      "

  ngrok:
    image: ngrok/ngrok:latest
    container_name: skillity_ngrok
    command: http api:3000 --log=stdout
    ports:
      - "4040:4040"
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: skillity_api
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://dev_user:dev_pass@db:5432/app_db"
      STORAGE_ENDPOINT: "http://minio:9000"
      STORAGE_BUCKET: "skillity"
      STORAGE_ACCESS_KEY: "dev_user"
      STORAGE_SECRET_KEY: "dev_pass"
      STORAGE_PUBLIC_URL: "http://localhost:9000"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
      PEXELS_API_KEY: "${PEXELS_API_KEY:-}"
      MOLLIE_API_KEY: "${MOLLIE_API_KEY:-}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3001}"
    volumes:
      - ./backend/src:/app/backend/src

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: skillity_frontend
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: development
      API_URL: http://api:3000
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
    command: ["bun", "run", "dev"]
    volumes:
      - ./frontend/app:/app/frontend/app
      - ./frontend/components:/app/frontend/components
      - ./frontend/lib:/app/frontend/lib
      - ./frontend/public:/app/frontend/public
      - ./packages/shared/src:/app/packages/shared/src

  adminer:
    image: adminer:latest
    container_name: skillity_adminer
    depends_on:
      - db
    ports:
      - "8080:8080"

volumes:
  pg_data:
  minio_data:
